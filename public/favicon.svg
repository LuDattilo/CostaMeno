<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad)" />
  <!-- Gas pump body -->
  <rect x="18" y="18" width="18" height="24" rx="3" fill="white" opacity="0.95"/>
  <!-- Gas pump nozzle -->
  <path d="M36 24 L42 20 L42 30 L38 28 L38 24" fill="white" opacity="0.85"/>
  <!-- Gas pump screen -->
  <rect x="22" y="22" width="10" height="6" rx="1.5" fill="url(#grad)" opacity="0.6"/>
  <!-- Downward trend arrow -->
  <path d="M34 36 L48 48" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M40 48 L48 48 L48 40" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small dot on trend -->
  <circle cx="34" cy="36" r="2" fill="white" opacity="0.7"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#BE2200"/>
      <stop offset="100%" stop-color="#D9914C"/>
    </linearGradient>
  </defs>
</svg>